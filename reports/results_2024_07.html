        .container { max-width: 1400px; margin: 0 auto; }

        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: #fff; padding: 20px; border-radius: 15px; position: relative; height: 400px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
        th { background: #34495e; color: #fff; padding: 12px; text-align: left; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.85em; }

        let charts = {};
        function runSim() {
            const cap0 = parseFloat(document.getElementById('initCap').value) || 100000;
            const k = parseFloat(document.getElementById('kelly').value);
            const mEV = parseFloat(document.getElementById('minEV').value);
            const mOdds = parseFloat(document.getElementById('minOddsRange').value);
            document.getElementById('kellyVal').innerText = k;
            document.getElementById('evVal').innerText = mEV.toFixed(1);
            document.getElementById('minOdds').innerText = mOdds.toFixed(1);

            let cap = cap0, maxCap = cap0, maxDD = 0, invT = 0, payT = 0, hits = 0, activeCount = 0;
            const pHist = [0], ddHist = [0], iHist = [0], labels = ["開始"];
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            raw.forEach((d) => {
                if (d.ev >= mEV && d.odds >= mOdds) {
                    activeCount++;
                    const b = d.odds - 1;
                    const p = d.win_prob / 100;
                    const f = Math.max(0, (p * (b + 1) - 1) / b);
                    let inv = Math.floor(cap * f * k / 100) * 100;
                    if (inv < 100 && cap >= 100 && f > 0) inv = 100;
                    if (inv > cap) inv = Math.floor(cap / 100) * 100;
                    const pay = (d.res === "○") ? Math.floor(inv * d.odds) : 0;
                    cap = cap - inv + pay;
                    invT += inv; payT += pay; if (d.res === "○") hits++;
                    maxCap = Math.max(maxCap, cap);
                    maxDD = Math.max(maxDD, maxCap - cap);
                    const curP = cap - cap0;
                    pHist.push(curP); ddHist.push(maxCap - cap); iHist.push(inv); labels.push(d.display_id);
                    tbody.innerHTML += `<tr class="${d.res==='○'?'status-win':''}"><td>${d.display_id}</td><td>${d.race_name}</td><td>${d.type}</td><td>${d.combo}</td><td>${d.ev.toFixed(2)}</td><td>${d.win_prob}%</td><td>${d.odds.toFixed(1)}倍</td><td>¥${inv.toLocaleString()}</td><td>${d.res==='○'?'的中':'×'}</td><td style="font-weight:bold; color:${curP>=0?'#27ae60':'#e74c3c'}">¥${curP.toLocaleString()}</td></tr>`;
                }
            });

            document.getElementById('finalProfit').innerText = '¥' + (cap-cap0).toLocaleString();
            document.getElementById('roiText').innerText = invT>0 ? (payT/invT*100).toFixed(1)+'%' : '0%';
            document.getElementById('hitRateText').innerText = activeCount>0 ? (hits/activeCount*100).toFixed(1)+'%' : '0%';
            document.getElementById('activeCountText').innerText = activeCount + ' レース';
            document.getElementById('ddText').innerText = '¥' + maxDD.toLocaleString();

            drawChart('pChart', '資産推移', labels, pHist, '#2980b9');
            drawChart('dChart', 'ドローダウン', labels, ddHist, '#e74c3c');
            drawChart('iChart', '投資額', labels, iHist, '#95a5a6', 'bar');
        }
        function drawChart(id, title, labels, data, color, type='line') {
            const ctx = document.getElementById(id);
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(ctx, {
                type: type,
                data: { labels: labels, datasets: [{ label: title, data: data, borderColor: color, backgroundColor: color+(type==='bar'?'88':'22'), fill: true, tension: 0.1, pointRadius: labels.length > 100 ? 0 : 3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, title: { display: true, text: title } }, scales: { x: { display: labels.length < 50 }, y: { grid: { color: (c) => c.tick.value === 0 ? '#000' : '#eee' } } } }
            });
        }
        window.onload = runSim;
    </script>
