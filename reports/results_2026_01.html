function calcKelly(prob, odds, budget, kf) {
  if (odds <= 1 || prob <= 0) return 0;
  const b = odds - 1;
  const fs = (prob * odds - 1) / b;
  if (fs <= 0) return 0;
  const f = Math.min(fs * kf, 0.2);
  const amt = Math.floor(budget * f / 100) * 100;
  return amt >= 100 ? amt : 0;
}

function getChecked(id) {
  return [...document.querySelectorAll(`#${id} input:checked`)].map(e => e.value);
}

function updateAll() {
  const budget  = parseFloat(document.getElementById('budget').value) || 10000;
  const kelly   = parseFloat(document.getElementById('kelly').value);
  const minEv   = parseFloat(document.getElementById('min-ev').value);
  const minOdds = parseFloat(document.getElementById('min-odds').value);
  const types   = getChecked('type-filters');
  const venues  = getChecked('venue-filters');

  const filtered = RAW
    .filter(b => b.ev >= minEv && b.odds >= minOdds && types.includes(b.type) && venues.includes(b.vg))
    .map(b => ({...b, invest: calcKelly(b.prob, b.odds, budget, kelly)}))
    .filter(b => b.invest > 0);

  // KPI
  const totalInv = filtered.reduce((s, b) => s + b.invest, 0);
  const totalPay = filtered.reduce((s, b) => s + (b.hit ? b.payout : 0), 0);
  const hits     = filtered.filter(b => b.hit).length;
  const pnl      = totalPay - totalInv;
  const rr       = totalInv > 0 ? totalPay / totalInv * 100 : 0;
  const hr       = filtered.length > 0 ? hits / filtered.length * 100 : 0;

  document.getElementById('kpi-rr').textContent     = rr.toFixed(1) + '%';
  document.getElementById('kpi-rr').className       = 'kpi-value ' + (rr >= 100 ? 'green' : 'red');
  document.getElementById('kpi-profit').textContent = (pnl >= 0 ? '+' : '') + pnl.toLocaleString() + '円';
  document.getElementById('kpi-profit').className   = 'kpi-value ' + (pnl >= 0 ? 'green' : 'red');
  document.getElementById('kpi-hr').textContent     = hr.toFixed(1) + '%';
  document.getElementById('kpi-bets').textContent   = filtered.length + '件';
  document.getElementById('kpi-inv').textContent    = totalInv.toLocaleString() + '円';
  document.getElementById('kpi-pay').textContent    = totalPay.toLocaleString() + '円';

  // Daily aggregation
  const byDate = {};
  for (const b of filtered) {
    if (!byDate[b.date]) byDate[b.date] = {inv: 0, pay: 0};
    byDate[b.date].inv += b.invest;
    byDate[b.date].pay += b.hit ? b.payout : 0;
  }
  const dates  = Object.keys(byDate).sort();
  const invArr = dates.map(d => byDate[d].inv);
  const payArr = dates.map(d => byDate[d].pay);
  const labels = dates.map(d => `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6)}`);

  // Cumulative P&L
  let cumPnl = 0;
  const cumArr = dates.map((d, i) => { cumPnl += payArr[i] - invArr[i]; return cumPnl; });

  // Max Drawdown
  let peak = 0;
  const ddArr = cumArr.map(v => { if (v > peak) peak = v; return peak > 0 ? (v - peak) / peak * 100 : 0; });

  // Rolling 30-day ROI
  const rollingRoi = dates.map((d, i) => {
    let wInv = 0, wPay = 0;
    for (let j = Math.max(0, i - 29); j <= i; j++) { wInv += invArr[j]; wPay += payArr[j]; }
    return wInv > 0 ? wPay / wInv * 100 : null;
  });

  // Monthly P&L
  const monthMap = {};
  for (const b of filtered) {
    const m = b.date.slice(0, 6);
    if (!monthMap[m]) monthMap[m] = {inv: 0, pay: 0};
    monthMap[m].inv += b.invest;
    monthMap[m].pay += b.hit ? b.payout : 0;
  }
  const months      = Object.keys(monthMap).sort();
  const monthLabels = months.map(m => m.slice(0,4) + '/' + m.slice(4,6));
  const monthPnl    = months.map(m => monthMap[m].pay - monthMap[m].inv);

  // Type stats
  const typeMap = {};
  for (const b of filtered) {
    if (!typeMap[b.type]) typeMap[b.type] = {inv: 0, pay: 0};
    typeMap[b.type].inv += b.invest;
    typeMap[b.type].pay += b.hit ? b.payout : 0;
  }
  const typeKeys = Object.keys(typeMap);
  const typeRR   = typeKeys.map(t => typeMap[t].inv > 0 ? typeMap[t].pay / typeMap[t].inv * 100 : 0);

  // EV band stats
  const evBands = [
    {min:1,max:2,label:'1〜2'}, {min:2,max:3,label:'2〜3'},
    {min:3,max:5,label:'3〜5'}, {min:5,max:10,label:'5〜10'}, {min:10,max:Infinity,label:'10+'}
  ];
  const evLabels = evBands.map(b => b.label);
  const evRR = evBands.map(band => {
    const bets = filtered.filter(b => b.ev >= band.min && b.ev < band.max);
    const inv  = bets.reduce((s, b) => s + b.invest, 0);
    const pay  = bets.reduce((s, b) => s + (b.hit ? b.payout : 0), 0);
    return inv > 0 ? pay / inv * 100 : null;
  });

  // Calibration: predicted prob vs actual hit rate
  const calibBands = [
    {min:0,max:0.05,label:'0-5%'}, {min:0.05,max:0.10,label:'5-10%'},
    {min:0.10,max:0.15,label:'10-15%'}, {min:0.15,max:0.20,label:'15-20%'},
    {min:0.20,max:0.30,label:'20-30%'}, {min:0.30,max:0.50,label:'30-50%'},
    {min:0.50,max:1.0,label:'50%+'}
  ];
  const calibLabels = calibBands.map(b => b.label);
  const calibPred = calibBands.map(band => {
    const bets = filtered.filter(b => b.prob >= band.min && b.prob < band.max);
    return bets.length > 0 ? bets.reduce((s, b) => s + b.prob, 0) / bets.length * 100 : null;
  });
  const calibActual = calibBands.map(band => {
    const bets = filtered.filter(b => b.prob >= band.min && b.prob < band.max);
    return bets.length > 0 ? bets.filter(b => b.hit).length / bets.length * 100 : null;
  });

  // === Chart updates ===
  updateChart('pnlChart', 'chart-pnl', labels, [{
    label: '累積損益', data: cumArr,
    borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)',
    fill: true, tension: 0.3, pointRadius: 3,
  }], 'line', {y: {ticks: {callback: v => v.toLocaleString() + '円'}}});

  updateChart('rollingChart', 'chart-rolling', labels, [
    {
      label: '30日ローリング回収率(%)', data: rollingRoi,
      borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)',
      fill: true, tension: 0.3, pointRadius: 2, spanGaps: true,
    },
    {
      label: '損益分岐(100%)', data: labels.map(() => 100),
      borderColor: '#ef4444', borderDash: [4, 4], borderWidth: 1.5,
      pointRadius: 0, fill: false,
    },
  ], 'line', {y: {ticks: {callback: v => v.toFixed(0) + '%'}}});

  updateChart('ddChart', 'chart-dd', labels, [{
    label: 'ドローダウン(%)', data: ddArr,
    borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.15)',
    fill: true, tension: 0.3, pointRadius: 2,
  }], 'line', {y: {ticks: {callback: v => v.toFixed(1) + '%'}}});

  updateChart('monthlyChart', 'chart-monthly', monthLabels, [{
    label: '月別純収支', data: monthPnl,
    backgroundColor: monthPnl.map(v => v >= 0 ? '#22c55e80' : '#ef444480'),
    borderColor: monthPnl.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
    borderWidth: 1,
  }], 'bar', {y: {ticks: {callback: v => v.toLocaleString() + '円'}}});

  updateChart('typeChart', 'chart-type', typeKeys, [{
    label: '回収率(%)', data: typeRR,
    backgroundColor: typeRR.map(v => v >= 100 ? '#22c55e80' : '#ef444480'),
    borderColor: typeRR.map(v => v >= 100 ? '#22c55e' : '#ef4444'),
    borderWidth: 1,
  }], 'bar', {y: {ticks: {callback: v => v.toFixed(0) + '%'}}}, {indexAxis: 'y'});

  updateChart('evChart', 'chart-ev', evLabels, [{
    label: '回収率(%)', data: evRR,
    backgroundColor: evRR.map(v => v == null ? '#33415580' : v >= 100 ? '#22c55e80' : '#ef444480'),
    borderColor: evRR.map(v => v == null ? '#334155' : v >= 100 ? '#22c55e' : '#ef4444'),
    borderWidth: 1,
  }], 'bar', {y: {ticks: {callback: v => v != null ? v.toFixed(0) + '%' : ''}}});

  updateChart('calibChart', 'chart-calib', calibLabels, [
    {label: '予測確率(%)', data: calibPred, backgroundColor: '#3b82f680', borderColor: '#3b82f6', borderWidth: 1},
    {label: '実的中率(%)', data: calibActual, backgroundColor: '#22c55e80', borderColor: '#22c55e', borderWidth: 1},
  ], 'bar', {y: {ticks: {callback: v => v != null ? v.toFixed(0) + '%' : ''}}});

  // Stats row
  const typeCount = {};
  for (const b of filtered) typeCount[b.type] = (typeCount[b.type] || 0) + 1;
  document.getElementById('stats-row').innerHTML =
    `<span>表示: <b>${filtered.length}件</b></span>` +
    `<span>的中: <b>${hits}件</b></span>` +
    Object.entries(typeCount).map(([t, c]) => `<span>${t}: <b>${c}</b></span>`).join('');

  // Table (with running P&L: -invest each bet, +payout on hit)
  const tbody = document.getElementById('bet-tbody');
  let runPnl = 0;
  tbody.innerHTML = filtered.slice(0, 500).map(b => {
    runPnl -= b.invest;
    if (b.hit) runPnl += b.payout;
    const pnlColor = runPnl >= 0 ? '#22c55e' : '#ef4444';
    const pnlText  = (runPnl >= 0 ? '+' : '') + runPnl.toLocaleString() + '円';
    return `
    <tr>
      <td>${b.date.slice(0,4)}/${b.date.slice(4,6)}/${b.date.slice(6)}</td>
      <td>${b.venue}</td>
      <td>${b.R}R</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.race}</td>
      <td><span class="tag ${TYPE_TAG[b.type]||''}">${b.type}</span></td>
      <td style="font-family:monospace">${b.combo}</td>
      <td style="text-align:right">${b.odds.toFixed(1)}倍</td>
      <td style="text-align:right;color:${b.ev>=4?'#22c55e':b.ev>=2?'#f59e0b':'#94a3b8'}">${b.ev.toFixed(2)}</td>
      <td style="text-align:right">${b.invest.toLocaleString()}円</td>
      <td style="text-align:right;color:${pnlColor};font-weight:600">${pnlText}</td>
      <td class="${b.hit?'hit':'miss'}">${b.hit?'○ 的中':'× 外れ'}</td>
      <td style="text-align:right;color:${b.hit?'#22c55e':'#475569'}">${b.hit?(b.payout.toLocaleString()+'円'):'-'}</td>
    </tr>`;
  }).join('');
}

function updateChart(varName, canvasId, labels, datasets, type, scaleOpts, extraOpts={}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  if (window[varName]) window[varName].destroy();
  window[varName] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#64748b', maxRotation: 45, font: { size: 10 } }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#64748b', font: { size: 10 }, ...((scaleOpts?.y?.ticks)||{}) }, grid: { color: '#1e293b' }, ...((scaleOpts?.y)||{}) },
      },
      ...extraOpts,
    },
  });
}

updateAll();
</script>
