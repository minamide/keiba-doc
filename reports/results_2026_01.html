    function calcKelly(prob, odds, budget, kf) {
      if (odds <= 1 || prob <= 0) return 0;
      const b = odds - 1;
      const fs = (prob * odds - 1) / b;
      if (fs <= 0) return 0;
      const f = Math.min(fs * kf, 0.2);
      const amt = Math.floor(budget * f / 100) * 100;
      return amt >= 100 ? amt : 0;
    }

      }], 'line', { y: { ticks: { callback: v => v.toFixed(1) + '%' } } });

      updateChart('monthlyChart', 'chart-monthly', monthLabels, [{
        label: '月別純収支', data: monthPnl,
        backgroundColor: monthPnl.map(v => v >= 0 ? '#22c55e80' : '#ef444480'),
        borderColor: monthPnl.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
        borderWidth: 1,
      }], 'bar', { y: { ticks: { callback: v => v.toLocaleString() + '円' } } });

      updateChart('typeChart', 'chart-type', typeKeys, [{
        label: '回収率(%)', data: typeRR,
        backgroundColor: typeRR.map(v => v >= 100 ? '#22c55e80' : '#ef444480'),
        borderColor: typeRR.map(v => v >= 100 ? '#22c55e' : '#ef4444'),
        borderWidth: 1,
      }], 'bar', { y: { ticks: { callback: v => v.toFixed(0) + '%' } } }, { indexAxis: 'y' });

      updateChart('evChart', 'chart-ev', evLabels, [{
        label: '回収率(%)', data: evRR,
        backgroundColor: evRR.map(v => v == null ? '#33415580' : v >= 100 ? '#22c55e80' : '#ef444480'),
        borderColor: evRR.map(v => v == null ? '#334155' : v >= 100 ? '#22c55e' : '#ef4444'),
        borderWidth: 1,
      }], 'bar', { y: { ticks: { callback: v => v != null ? v.toFixed(0) + '%' : '' } } });

      updateChart('calibChart', 'chart-calib', calibLabels, [
        { label: '予測確率(%)', data: calibPred, backgroundColor: '#3b82f680', borderColor: '#3b82f6', borderWidth: 1 },
        { label: '実的中率(%)', data: calibActual, backgroundColor: '#22c55e80', borderColor: '#22c55e', borderWidth: 1 },
      ], 'bar', { y: { ticks: { callback: v => v != null ? v.toFixed(0) + '%' : '' } } });

      // Stats row
      const typeCount = {};
      for (const b of filtered) typeCount[b.type] = (typeCount[b.type] || 0) + 1;
      document.getElementById('stats-row').innerHTML =
        `<span>表示: <b>${filtered.length}件</b></span>` +
        `<span>的中: <b>${hits}件</b></span>` +
        Object.entries(typeCount).map(([t, c]) => `<span>${t}: <b>${c}</b></span>`).join('');

      // Table (with running P&L: -invest each bet, +payout on hit)
      const tbody = document.getElementById('bet-tbody');
      let runPnl = 0;
      tbody.innerHTML = filtered.slice(0, 500).map(b => {
        runPnl -= b.invest;
        if (b.hit) runPnl += b.payout;
        const pnlColor = runPnl >= 0 ? '#22c55e' : '#ef4444';
        const pnlText = (runPnl >= 0 ? '+' : '') + runPnl.toLocaleString() + '円';
        return `
    <tr>
      <td>${b.date.slice(0, 4)}/${b.date.slice(4, 6)}/${b.date.slice(6)}</td>
      <td>${b.venue}</td>
      <td>${b.R}R</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.race}</td>
      <td><span class="tag ${TYPE_TAG[b.type] || ''}">${b.type}</span></td>
      <td style="font-family:monospace">${b.combo}</td>
      <td style="text-align:right">${b.odds.toFixed(1)}倍</td>
      <td style="text-align:right;color:${b.ev >= 4 ? '#22c55e' : b.ev >= 2 ? '#f59e0b' : '#94a3b8'}">${b.ev.toFixed(2)}</td>
      <td style="text-align:right">${b.invest.toLocaleString()}円</td>
      <td style="text-align:right;color:${pnlColor};font-weight:600">${pnlText}</td>
      <td class="${b.hit ? 'hit' : 'miss'}">${b.hit ? '○ 的中' : '× 外れ'}</td>
      <td style="text-align:right;color:${b.hit ? '#22c55e' : '#475569'}">${b.hit ? (b.payout.toLocaleString() + '円') : '-'}</td>
    </tr>`;
      }).join('');
    }

    function updateChart(varName, canvasId, labels, datasets, type, scaleOpts, extraOpts = {}) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (window[varName]) window[varName].destroy();
      window[varName] = new Chart(ctx, {
        type,
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#64748b', maxRotation: 45, font: { size: 10 } }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#64748b', font: { size: 10 }, ...((scaleOpts?.y?.ticks) || {}) }, grid: { color: '#1e293b' }, ...((scaleOpts?.y) || {}) },
          },
          ...extraOpts,
        },
      });
    }

    updateAll();
  </script>
</body>

</html>
